version: '3.8'

services:
  fialangchain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fia-langchain-service
    ports:
      - "8086:8086"
    env_file:
      - .env
    environment:
      - PORT=8086
    restart: unless-stopped
    networks:
      - default
      - alchat-shared  # 连接共享网络以供 Go 后端访问

networks:
  default: {}
  alchat-shared:
    external: true  # 必须提前创建: docker network create alchat-shared
